version: '3.8'

# ==========================================
# 🚀 ARCHITECTURE MICROSERVICES - EXACTLY ONCE
# ==========================================
#
# Client → Payment Service → PostgreSQL
#              ↓
#           Kafka
#              ↓
#       Notification Service → Email/SMS
#
# ==========================================

services:
  # ==========================================
  # 🦓 ZOOKEEPER - Coordination Kafka
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - payment-network

  # ==========================================
  # 📡 KAFKA - Event Streaming Platform
  # ==========================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      # 🛡️ EXACTLY ONCE: Configuration transactions
      KAFKA_ENABLE_IDEMPOTENCE: "true"
    networks:
      - payment-network

  # ==========================================
  # 🗄️ POSTGRESQL - Base de données
  # ==========================================
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: payment_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - payment-network

  # ==========================================
  # 💳 PAYMENT SERVICE - Spring Boot
  # ==========================================
  payment-service:
    build:
      context: ./payment_service
      dockerfile: Dockerfile
    container_name: payment-service
    depends_on:
      - postgres
      - kafka
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - payment-network

  # ==========================================
  # 🔔 NOTIFICATION SERVICE - Spring Boot
  # ==========================================
  notification-service:
    build:
      context: ./notification_service
      dockerfile: Dockerfile
    container_name: notification-service
    depends_on:
      - kafka
      - postgres
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - payment-network

  # ==========================================
  # 🌐 API GATEWAY - Spring Boot
  # ==========================================
  api-gateway:
    build:
      context: ./api_gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    depends_on:
      - payment-service
      - notification-service
    ports:
      - "8080:8080"
    networks:
      - payment-network

# ==========================================
# 🌐 NETWORK
# ==========================================
networks:
  payment-network:
    driver: bridge

# ==========================================
# 💾 VOLUMES
# ==========================================
volumes:
  postgres_data:
